<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>復健科臨床評估表單系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{--paper:#FAF9F6;--ink:#1F2A2A;--teal:#0E5A5A;--teal-soft:#E3EFEE;--line:#D8D5CC;--low:#FBEFEA;--low-text:#9A4A2E;--mid:#F2F1EA;--mid-text:#5A5A4F;--high:#E8F1E6;--high-text:#3A6B3A;--amber:#B07A1E;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-tap-highlight-color:transparent}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 120px}
header.app{border-bottom:3px double var(--teal);padding:14px 0 12px;margin-bottom:18px}
header.app h1{font-family:"Noto Serif TC",serif;font-size:1.25rem;color:var(--teal);letter-spacing:.04em}
header.app p{font-size:.8rem;color:#6B6B60;margin-top:2px}
.picker{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;margin-bottom:20px}
.picker button{padding:14px 10px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-size:.95rem;font-weight:500;cursor:pointer;transition:all .15s}
.picker button.on{border-color:var(--teal);background:var(--teal-soft);color:var(--teal);font-weight:700}
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.card h2{font-size:.85rem;letter-spacing:.12em;color:var(--teal);font-weight:700;margin-bottom:12px;text-transform:uppercase}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:.78rem;color:#6B6B60}
.field input, .field textarea{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:.95rem;font-family:inherit;width:100%}
.field textarea{min-height:110px;resize:vertical}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chips button{padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:999px;font-size:.85rem;cursor:pointer}
.chips button.on{background:var(--teal);border-color:var(--teal);color:#fff}
.item{padding:12px 0;border-bottom:1px dashed var(--line)}
.band{display:flex;gap:4px;align-items:stretch}
.zone{display:flex;gap:3px;padding:3px;border-radius:8px}
.zone.low{background:var(--low)} .zone.mid{background:var(--mid)} .zone.high{background:var(--high)}
.band button{width:34px;height:38px;border:1px solid transparent;border-radius:6px;background:transparent;font-family:inherit;cursor:pointer}
.band button.on{background:var(--teal);color:#fff;font-weight:700}
.aibtn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:var(--amber);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer}
.aierr{font-size:.8rem;color:#A33;margin-top:6px;display:none;padding:8px;background:#FFF0F0;border-radius:6px;}
.actionbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 16px;display:flex;justify-content:center;gap:10px;z-index:50}
.btn-export{background:var(--teal);color:#fff;padding:11px 22px;border-radius:10px;border:none;font-weight:700}
.btn-clear{background:#fff;color:#8A4A3A;padding:11px 22px;border-radius:10px;border:1px solid var(--line)}
#printArea{display:none}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <h1>復健科臨床評估系統</h1>
    <p>雲林基督教醫院復健技術課</p>
  </header>
  <div class="picker">
    <button id="pick-minicex" class="on" onclick="switchForm('minicex')">Mini-CEX</button>
    <button id="pick-dops" onclick="switchForm('dops')">Splint-DOPS</button>
    <button id="pick-evalDops" onclick="switchForm('evalDops')">評估 DOPS</button>
  </div>
  <div id="formRoot"></div>
  <div class="card">
    <h2>回饋整理 (Gemini AI)</h2>
    <textarea id="rawNotes" placeholder="請在此貼上觀察筆記..."></textarea>
    <div style="margin-top:10px"><button class="aibtn" id="aiGo" onclick="runAI()">🚀 AI 整理至回饋欄</button></div>
    <div class="aierr" id="aiErr"></div>
    <div id="fbFields"></div>
  </div>
</div>
<div class="actionbar">
  <button class="btn-clear" onclick="clearAll()">清除重填</button>
  <button class="btn-export" onclick="exportPDF()">匯出 PDF</button>
</div>
<div id="printArea"></div>

<script>
// 【重要】請填入您的 AIza 開頭 API Key
const DEVELOPER_API_KEY = "您的API_KEY_貼在這裡"; 

const FORMS = {
  minicex: {
    title: "Mini-CEX 評量表",
    items: ["1. 醫療面談","2. 身體檢查","3. 操作技能","4. 諮商衛教","5. 臨床判斷","6. 組織效能","7. 人道專業"],
    feedback: [{k:"praise", label:"值得嘉許"},{k:"improve", label:"可再精進"},{k:"action", label:"共識行動"}]
  },
  dops: {
    title: "Splint-DOPS 副木評估",
    items: ["1. 病人辨識","2. 確認位置","3. 製作準備","4. 材料裁剪","5. 溫度確認","6. 製作成型","7. 修改固定","8. 舒適度","9. 注意事項","10. 衛教"],
    feedback: [{k:"good", label:"表現良好的項目"},{k:"improve", label:"建議加強項目"}]
  },
  evalDops: {
    title: "評估工具 DOPS",
    items: ["1. 施測準備","2. 說明技巧","3. 示範技巧","4. 流程順暢","5. 使用表單","6. 正確給分","7. 常模對照","8. 結果解釋","9. 注意事項","10. 整體表現"],
    feedback: [{k:"good", label:"表現良好的項目"},{k:"improve", label:"建議加強項目"}]
  }
};

let cur = "minicex";
let state = { minicex:{info:{},scores:{},fb:{}}, dops:{info:{},scores:{},fb:{}}, evalDops:{info:{},scores:{},fb:{}} };

function render(){
  const F = FORMS[cur], S = state[cur];
  let h = "";
  F.items.forEach((it,i) => {
    h += `<div class="item"><div>${it}</div><div class="band">`+[1,2,3,4,5,6,7,8,9].map(v=>`<button class="${S.scores[i]===v?'on':''}" onclick="setScore(${i},${v})">${v}</button>`).join("")+`</div></div>`;
  });
  document.getElementById("formRoot").innerHTML = h;
  renderFb();
}

function setScore(i,v){ state[cur].scores[i]=v; render(); }
function switchForm(f){ cur=f; render(); }

function renderFb(){
  document.getElementById("fbFields").innerHTML = FORMS[cur].feedback.map(f=>
    `<div class="field" style="margin-top:10px"><label>${f.label}</label><textarea oninput="state[cur].fb['${f.k}']=this.value">${state[cur].fb[f.k]||""}</textarea></div>`
  ).join("");
}

async function runAI(){
  const notes = document.getElementById("rawNotes").value.trim();
  const err = document.getElementById("aiErr");
  if(!notes) return;
  const btn = document.getElementById("aiGo");
  btn.disabled = true; btn.textContent = "⚙️ AI 整理中…";
  
  const F = FORMS[cur];
  const fields = F.feedback.map(f => f.label).join(", ");
  const instruction = `你是臨床助理。請將筆記分類填入: ${fields}。規則: Mini-CEX需分3欄, DOPS分2欄。輸出純 JSON。`;

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${DEVELOPER_API_KEY}`, {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        contents: [{parts: [{text: notes}]}],
        systemInstruction: {parts: [{text: instruction}]},
        generationConfig: {responseMimeType: "application/json"}
      })
    });
    const d = await res.json();
    const parsed = JSON.parse(d.candidates[0].content.parts[0].text);
    F.feedback.forEach(f => { if(parsed[f.label]) state[cur].fb[f.k] = parsed[f.label]; });
    renderFb();
    btn.textContent = "✅ 完成"; setTimeout(()=>btn.textContent="🚀 AI 整理至回饋欄", 2000);
  } catch(e) {
    err.textContent = "整理失敗：" + e.message; err.style.display="block";
  } finally { btn.disabled = false; }
}

function clearAll(){ location.reload(); }
function exportPDF(){ window.print(); }

render();
</script>
</body>
</html>
