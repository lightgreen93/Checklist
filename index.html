<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">

<title>復健科臨床評估表單系統</title>

<style>
:root{
  --paper:#FAF9F6;
  --ink:#1F2A2A;
  --teal:#0E5A5A;
  --teal-soft:#E3EFEE;
  --line:#D8D5CC;
  --low:#FBEFEA;  --low-text:#9A4A2E;
  --mid:#F2F1EA;  --mid-text:#5A5A4F;
  --high:#E8F1E6; --high-text:#3A6B3A;
  --amber:#B07A1E;
}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Noto Sans TC",system-ui,sans-serif;background:var(--paper);color:var(--ink);line-height:1.6;-webkit-tap-highlight-color:transparent}
.wrap{max-width:760px;margin:0 auto;padding:20px 16px 120px}
header.app{border-bottom:3px double var(--teal);padding:14px 0 12px;margin-bottom:18px}
header.app h1{font-family:"Noto Serif TC",serif;font-size:1.25rem;color:var(--teal);letter-spacing:.04em; cursor:pointer;}
header.app p{font-size:.8rem;color:#6B6B60;margin-top:2px}
/* 表單選擇 */
.picker{display:grid;grid-template-columns:repeat(3, 1fr);gap:10px;margin-bottom:20px}
.picker button{padding:14px 10px;border:1.5px solid var(--line);background:#fff;border-radius:10px;font-size:.95rem;font-weight:500;cursor:pointer;font-family:inherit;color:var(--ink);transition:border-color .15s,background .15s}
.picker button.on{border-color:var(--teal);background:var(--teal-soft);color:var(--teal);font-weight:700}
/* 區塊 */
.card{background:#fff;border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.card h2{font-size:.85rem;letter-spacing:.12em;color:var(--teal);font-weight:700;margin-bottom:12px;text-transform:uppercase}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:.78rem;color:#6B6B60}
.field input[type=text],.field input[type=date],.field input[type=time],.field input[type=number],.field textarea{padding:8px 10px;border:1px solid var(--line);border-radius:8px;font-size:.95rem;font-family:inherit;background:#FDFDFB;width:100%}
.field textarea{min-height:110px;resize:vertical;line-height:1.7}
.chips{display:flex;flex-wrap:wrap;gap:6px}
.chips button{padding:6px 12px;border:1px solid var(--line);background:#fff;border-radius:999px;font-size:.85rem;cursor:pointer;font-family:inherit;color:var(--ink)}
.chips button.on{background:var(--teal);border-color:var(--teal);color:#fff;font-weight:500}
/* 評分列 */
.item{padding:12px 0;border-bottom:1px dashed var(--line)}
.item:last-child{border-bottom:none}
.item .name{font-weight:700;font-size:.95rem}
.item .guide{font-size:.74rem;color:#7C7C70;margin:2px 0 8px;line-height:1.5}
.band{display:flex;gap:4px;align-items:stretch}
.zone{display:flex;gap:3px;padding:3px;border-radius:8px}
.zone.low{background:var(--low)} .zone.mid{background:var(--mid)} .zone.high{background:var(--high)}
.band button{width:34px;height:38px;border:1px solid transparent;border-radius:6px;background:transparent;font-size:.9rem;font-family:inherit;cursor:pointer;color:inherit}
.zone.low button{color:var(--low-text)} .zone.mid button{color:var(--mid-text)} .zone.high button{color:var(--high-text)}
.band button.on{background:var(--teal);color:#fff !important;font-weight:700;border-color:var(--teal)}
.band .na{margin-left:auto;width:auto;padding:0 10px;border:1px dashed var(--line);color:#8A8A7E;font-size:.78rem;border-radius:8px}
.band .na.on{background:#555;color:#fff;border-style:solid;border-color:#555}
.zonelabels{display:flex;gap:4px;font-size:.66rem;color:#9A9A8E;margin-top:3px}
.zonelabels span{text-align:center}
/* AI 區 */
.aibtn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;background:var(--amber);color:#fff;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;font-family:inherit}
.aibtn:disabled{opacity:.5;cursor:wait}
.ainote{font-size:.75rem;color:#8A8A7E;margin-top:6px}
.aierr{font-size:.8rem;color:#A33;margin-top:6px;display:none;padding:8px;background:#FFF0F0;border-radius:6px;}
/* 底部固定列 */
.actionbar{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);padding:10px 16px;display:flex;gap:10px;justify-content:center;z-index:50}
.actionbar button{padding:11px 22px;border-radius:10px;font-size:.95rem;font-weight:700;font-family:inherit;cursor:pointer}
.btn-export{background:var(--teal);color:#fff;border:none}
.btn-clear{background:#fff;color:#8A4A3A;border:1px solid var(--line)}
/* 列印 */
#printArea{display:none}
@media print{
  body *{visibility:hidden}
  .wrap,.actionbar{display:none}
  #printArea{display:block;visibility:visible;position:absolute;left:0;top:0;width:100%}
  #printArea *{visibility:visible}
  @page{size:A4;margin:14mm 16mm}
}
#printArea{font-family:"Noto Sans TC","標楷體",serif;color:#000;font-size:10.5pt;line-height:1.55;-webkit-text-size-adjust:100%;text-size-adjust:100%}
#printArea .pt-title{text-align:center;font-weight:700;font-size:18pt;margin-bottom:4pt;letter-spacing:0.05em}
#printArea .pt-sub{text-align:center;font-size:14pt;margin-bottom:12pt}
#printArea .pt-row{margin:2pt 0}
#printArea .pt-item{margin:3pt 0 0}
#printArea .pt-guide{font-size:8pt;color:#444;margin:0 0 2pt 14pt}
#printArea .pt-fb{margin-top:6pt}
#printArea .pt-fb b{display:block}
#printArea .pt-sig{margin-top:14pt;display:flex;justify-content:space-between}
#printArea hr{border:none;border-top:1px solid #000;margin:6pt 0}
@media(max-width:480px){
  .picker{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
  .band button{width:30px;height:36px;font-size:.85rem}
  .header-actions{flex-direction:column; align-items:flex-end; gap:6px;}
}
</style>
</head>
<body>
<div class="wrap">
  <header class="app" style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; flex-wrap:wrap;">

    </div>
    <div class="header-actions" style="display:flex; flex-wrap:wrap; justify-content:flex-end; gap:8px;">

<script>
// =========================================================================
// 【AI 金鑰設定方式】
// 本檔案「不」內建任何 API 金鑰（網頁原始碼任何人都看得到，放金鑰會外洩）。
// 需要一鍵 AI 整理的使用者：點右上角「🔑 AI 金鑰」按鈕，貼入自己申請的免費 Gemini 金鑰，
// 金鑰只儲存在該裝置瀏覽器的 localStorage，不會上傳到任何地方。
// 申請方式：aistudio.google.com 登入 Google 帳號 → Get API key（免費、免綁卡）
// =========================================================================

/* ---------- 工具函式 ---------- */
function esc(s){
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

/* ---------- AI 金鑰設定（點右上角 🔑 按鈕） ---------- */
function openKeySettings(){
  const curKey = localStorage.getItem('userGeminiApiKey') || "";
  const status = curKey ? "✅ 此裝置已設定金鑰（結尾 …" + curKey.slice(-4) + "）" : "⚠️ 此裝置尚未設定金鑰";
  const input = prompt(
    "【AI 金鑰設定】\n" + status + "\n\n" +
    "・貼上你的 Gemini API 金鑰後按「確定」即可啟用一鍵整理\n" +
    "・輸入 clear 可清除此裝置上的金鑰\n" +
    "・直接按「取消」則不做變更\n\n" +
    "免費申請：aistudio.google.com → Get API key（登入 Google 帳號即可）",
    ""
  );
  if(input === null) return;
  const v = input.trim();
  const msg = document.getElementById("barMsg");
  if(v.toLowerCase() === "clear"){
    localStorage.removeItem('userGeminiApiKey');
    msg.textContent = "已清除此裝置的 AI 金鑰。";
  } else if(v){
    localStorage.setItem('userGeminiApiKey', v);
    msg.textContent = "✅ 金鑰已儲存在此裝置，可使用一鍵 AI 整理。";
  } else {
    return;
  }
  updateAiNote();
  setTimeout(()=>{ msg.textContent = ""; }, 5000);
}

function updateAiNote(){
  const note = document.querySelector(".ainote");
  const keyBtn = document.getElementById("keyBtn");
  const hasKey = !!localStorage.getItem('userGeminiApiKey');
  keyBtn.textContent = hasKey ? "🔑 金鑰已設定" : "🔑 AI 金鑰";
  keyBtn.style.background = hasKey ? "var(--teal-soft)" : "#fff";
  keyBtn.style.color = hasKey ? "var(--teal)" : "var(--amber)";
  keyBtn.style.borderColor = hasKey ? "var(--teal)" : "var(--amber)";
  note.innerHTML = hasKey
    ? "✅ 此裝置已設定金鑰：輸入筆記後可直接點「AI 整理」。也可改用複製指令或手動填寫。"
    : "三種填寫方式：① 點右上角「🔑 AI 金鑰」貼入自己的免費 Gemini 金鑰，即可一鍵整理 ② 點「複製整理指令」貼到自己慣用的 AI ③ 直接在下方欄位手動填寫。";
}

let customLogoBase64 = localStorage.getItem('formLogoBase64') || BUILTIN_LOGO;

function initLogo(){
  const preview = document.getElementById("logoPreview");
  const label = document.getElementById("logoLabel");
  preview.src = customLogoBase64;
  preview.style.display = "inline-block";
  label.textContent = (customLogoBase64 === BUILTIN_LOGO) ? "🔄 更換 Logo（已內建院徽）" : "🔄 更換 Logo";
}



function handleLogoUpload(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    customLogoBase64 = evt.target.result;
    try { localStorage.setItem('formLogoBase64', customLogoBase64); } catch(err) {}
    initLogo();
    
    const msg = document.getElementById("barMsg");
    msg.textContent = "✅ Logo 已儲存！匯出 PDF 時將自動套用。";
    setTimeout(()=>msg.textContent="", 4000);
  };
  reader.readAsDataURL(file);
}

/* ---------- 畫面 ---------- */
function switchForm(f){
  cur = f;
  document.getElementById("pick-minicex").classList.toggle("on", f==="minicex");
  document.getElementById("pick-dops").classList.toggle("on", f==="dops");
  document.getElementById("pick-evalDops").classList.toggle("on", f==="evalDops");
  render();
}

function render(){
  const F = FORMS[cur], S = state[cur];
  let h = '<div class="card"><h2>基本資料</h2><div class="fgrid">';
  for(const fd of F.info){
    h += `<div class="field${fd.full?" full":""}"><label>${fd.label}</label>`;
    if(fd.type==="chips"){
      h += '<div class="chips">' + fd.opts.map(o=>
        `<button class="${S.info[fd.k]===o?"on":""}" onclick="setInfo('${fd.k}','${o}')">${o}</button>`).join("") + '</div>';
    } else {
      h += `<input type="${fd.type}" value="${esc(S.info[fd.k]||"")}" oninput="state['${cur}'].info['${fd.k}']=this.value">`;
    }
    h += '</div>';
  }
  h += '</div></div>';

  h += `<div class="card"><h2>評量項目</h2>
    <div style="font-size:.74rem;color:#8A8A7E;margin-bottom:8px">${F.scaleNote}</div>`;
  F.items.forEach((it,i)=>{
    const sel = S.scores[i];
    h += `<div class="item"><div class="name">${it.n}</div>`;
    if(it.g) h += `<div class="guide">${it.g}</div>`;
    h += '<div class="band">';
    h += '<div class="zone low">' +[1,2,3].map(v=>scoreBtn(i,v,sel)).join("")+'</div>';
    h += '<div class="zone mid">' +[4,5,6].map(v=>scoreBtn(i,v,sel)).join("")+'</div>';
    h += '<div class="zone high">'+[7,8,9].map(v=>scoreBtn(i,v,sel)).join("")+'</div>';
    h += `<button class="na ${sel==="NA"?"on":""}" onclick="setScore(${i},'NA')">${F.naLabel}</button>`;
    h += '</div>';
    h += `<div class="zonelabels"><span style="flex:1">未達標準</span><span style="flex:1">符合標準</span><span style="flex:1">優秀</span></div>`;
    h += '</div>';
  });
  h += '</div>';
  document.getElementById("formRoot").innerHTML = h;
  renderFb();
}

function setScore(i,v){

function renderFb(){

    `<div class="field full" style="margin-bottom:10px"><label>${f.label}</label>

  ).join("");
}

/* ---------- AI 整理 ---------- */
function buildPrompt(notes){
  const F = FORMS[cur];
  const keys = F.feedback.map(f=>`「${f.label}」`).join("、");
  
  let rule2 = cur === "minicex" 
    ? `2. 正向肯定放入「${F.feedback[0].label}」；待改進與具體建議放入「${F.feedback[1].label}」；下次觀察前可執行的具體目標放入「${F.feedback[2].label}」。`
    : `2. 正向肯定放入「${F.feedback[0].label}」；待改進與具體建議放入「${F.feedback[1].label}」。`;

  return `你是復健科臨床教師的助理。以下是教師對學員的直接觀察筆記，請整理成正式評估表回饋文字，分成 ${keys} ${F.feedback.length} 個欄位。

規則：
1. 使用繁體中文、臨床專業但精簡的語氣，以具體行為描述為主，每欄 1～3 句。
${rule2}
3. 筆記中沒有提到的內容不要編造；若某欄沒有對應內容請留空並註明。
4. 不要出現病人姓名等可識別資訊。

觀察筆記：
${notes}`;
}

function copyPrompt(){
  const notes = document.getElementById("rawNotes").value.trim();
  const err = document.getElementById("aiErr");
  err.style.display="none";
  if(!notes){
    err.style.color="#A33"; err.style.backgroundColor="#FFF0F0";
    err.textContent="請先在上方貼入觀察筆記。"; err.style.display="block"; return;
  }
  const t = buildPrompt(notes);
  const formName = (cur==="minicex") ? "Mini-CEX（三欄）" : (cur==="dops" ? "Splint-DOPS（兩欄）" : "評估工具 DOPS（兩欄）");

  function showSuccess(){
    err.style.color="#2A6B3A";
    err.style.backgroundColor="#E8F1E6";
    err.innerHTML="✅ 已複製整理指令【" + formName + "】，請貼到 <a href='https://gemini.google.com/' target='_blank' style='color:#0E5A5A;'>Gemini</a>、<a href='https://chatgpt.com/' target='_blank' style='color:#0E5A5A;'>ChatGPT</a> 或 <a href='https://claude.ai/' target='_blank' style='color:#0E5A5A;'>Claude</a>，再把結果貼回下方欄位。";
    err.style.display="block";
  }

  function showManualBox(){
    err.style.color="#5A5A4F";
    err.style.backgroundColor="#F2F1EA";
    err.innerHTML="此瀏覽器不允許自動複製。<b>點一下下方文字框會自動全選</b>，長按選「複製」即可，然後貼到 <a href='https://gemini.google.com/' target='_blank' style='color:#0E5A5A;'>Gemini</a>、<a href='https://chatgpt.com/' target='_blank' style='color:#0E5A5A;'>ChatGPT</a> 或 <a href='https://claude.ai/' target='_blank' style='color:#0E5A5A;'>Claude</a>：";
    const ta = document.createElement("textarea");
    ta.value = t;
    ta.readOnly = true;
    ta.style.cssText = "width:100%;min-height:160px;margin-top:8px;padding:8px;font-family:inherit;font-size:.85rem;line-height:1.6;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);";
    ta.addEventListener("click", function(){
      this.focus();
      this.setSelectionRange(0, this.value.length);
    });
    err.appendChild(ta);
    err.style.display="block";
  }

  function legacyCopy(){
    const ta = document.createElement("textarea");
    ta.value = t;
    ta.setAttribute("readonly","");
    ta.style.cssText = "position:fixed;left:-9999px;top:0;";
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, t.length);
    let ok = false;
    try{ ok = document.execCommand("copy"); }catch(ex){ ok = false; }
    document.body.removeChild(ta);
    if(ok){ showSuccess(); } else { showManualBox(); }
  }

  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(showSuccess).catch(legacyCopy);
  } else {
    legacyCopy();
  }
}

// 自動 AI 整理
async function runAI(){
  const notes = document.getElementById("rawNotes").value.trim();
  const err = document.getElementById("aiErr");
  err.style.display="none";
  
  if(!notes){ err.textContent="請先在上方貼入觀察筆記。"; err.style.display="block"; return; }

  // 改為僅從瀏覽器的本地儲存讀取金鑰（透過彩蛋設定）
  const activeApiKey = localStorage.getItem('userGeminiApiKey');

  if(!activeApiKey) {
    err.style.color="#A33"; err.style.backgroundColor="#FFF0F0";
    err.innerHTML="此裝置尚未設定 AI 金鑰，無法一鍵整理。你可以：<br>① 點右上角「🔑 AI 金鑰」貼入自己申請的免費金鑰（aistudio.google.com → Get API key）<br>② 點「複製整理指令」貼到自己慣用的 AI<br>③ 直接在下方欄位手動填寫"; 
    err.style.display="block";
    return;
  }
  
  const btn = document.getElementById("aiGo");
  btn.disabled = true; 
  btn.textContent = "⚙️ AI 整理中…";
  
  const F = FORMS[cur];
  
  const schemaProperties = {};
  F.feedback.forEach(f => {
      schemaProperties[f.k] = { type: "STRING", description: f.label };
  });

  let rule3 = cur === "minicex" 
    ? `3. 正向肯定放入「${F.feedback[0].label}」；待改進與具體建議放入「${F.feedback[1].label}」；下次觀察前可執行的具體目標放入「${F.feedback[2].label}」。`
    : `3. 正向肯定放入「${F.feedback[0].label}」；待改進與具體建議放入「${F.feedback[1].label}」。`;

  const systemPrompt = `你是復健科臨床教師的助理。請將教師對學員的直接觀察筆記，整理成正式評估表回饋文字。
規則：
1. 嚴格依照提供的 JSON Schema 輸出。
2. 使用繁體中文、臨床專業但精簡的語氣，以具體行為描述為主，每個欄位產生 1～3 句話。
${rule3}
4. 筆記中沒有提到的內容絕對不要編造；若某欄沒有對應內容，該欄請回傳空字串 ("")。
5. 內容中絕對不要出現病人姓名等可識別之隱私資訊。`;

  const userQuery = `觀察筆記：\n${notes}`;

  const payload = {
    contents: [{ parts: [{ text: userQuery }] }],
    systemInstruction: { parts: [{ text: systemPrompt }] },
    generationConfig: { 
        responseMimeType: "application/json", 
        responseSchema: { 
            type: "OBJECT", 
            properties: schemaProperties 
        } 
    }
  };

  try{
    let data = null, lastErr = null;
    const delays = [1000, 2000, 4000];
    
    for(let attempt=0; attempt<=3; attempt++){
      if(attempt > 0) btn.textContent = `⚙️ 整理中…（第 ${attempt+1} 次嘗試）`;
      try{
        const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeApiKey}`, {
          method:"POST",
          headers:{"Content-Type":"application/json"},
          body:JSON.stringify(payload)
        });
        
        data = await r.json();
        if(!r.ok) {
           if (data.error && data.error.message.includes("API key not valid")) {
               throw new Error("AI 金鑰無效或不正確，請重新設定");
           }
           throw new Error(data.error?.message || `API 回應錯誤 ${r.status}`);
        }
        break; 
      }catch(e){
        lastErr = e;
        if(e.message.includes("API 金鑰無效")) break; 
        if(attempt < 3) await new Promise(res => setTimeout(res, delays[attempt]));
      }
    }
    
    if(!data || data.error) throw lastErr;
    
    const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
    if(!textResponse) throw new Error("AI 未回傳內容");
    
    const parsed = JSON.parse(textResponse);
    const S = state[cur];
    
    for(const f of FORMS[cur].feedback){
      if(parsed[f.k] !== undefined){ 
          S.fb[f.k] = parsed[f.k]; 
      }
    }
    renderFb();
    
    err.style.color="#2A6B3A"; err.style.backgroundColor="#E8F1E6"; 
    err.textContent = "✅ 整理完成！";
    err.style.display = "block";
    setTimeout(()=>err.style.display="none", 3000);
    
  }catch(e){
    err.style.color="#A33"; err.style.backgroundColor="#FFF0F0";
    err.textContent = "自動整理失敗 ("+e.message+")。請檢查網路或金鑰。";
    err.style.display = "block";
  }finally{
    btn.disabled = false; btn.textContent = "🚀 AI 整理至回饋欄";
  }
}

async function exportPDF(mode = "save"){
  const isShare = mode === "share";
  const msg = document.getElementById("barMsg");
  const btn = document.getElementById("exportBtn");
  msg.textContent = "";
  if(typeof html2canvas === "undefined" || !window.jspdf){
    msg.textContent = "PDF 元件載入失敗，請重新整理頁面後再試。";
    return;
  }
  const activeBtn = isShare ? document.getElementById("shareBtn") : btn;
  const origText = activeBtn.textContent;
  btn.disabled = true; document.getElementById("shareBtn").disabled = true;
  activeBtn.textContent = "產生中…";
  
  buildPrint();
  const area = document.getElementById("printArea");
  
  area.style.cssText = "display:block;position:fixed;left:-9999px;top:0;width:794px;background:#fff;padding:40px 48px;";

  const images = area.querySelectorAll('img');
  const imagePromises = Array.from(images).map(img => {
    if (img.complete && img.naturalHeight > 0) return Promise.resolve();
    return new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve; 
    });
  });
  
  await Promise.all(imagePromises);
  await new Promise(r => setTimeout(r, 600));

  try{
    const canvas = await html2canvas(area,{scale:2, backgroundColor:"#ffffff", useCORS:true});
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({unit:"mm",format:"a4"});
    const pageW = 210, pageH = 297;
    const imgW = pageW;
    const imgH = canvas.height * imgW / canvas.width;
    if(imgH <= pageH){
      pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",0,0,imgW,imgH);
    }else if(imgH <= pageH * 1.15){
      // 只超出一頁不到 15%：整體等比縮小塞進一頁，避免產生幾乎空白的第二頁
      const scale = pageH / imgH;
      const w = imgW * scale;
      pdf.addImage(canvas.toDataURL("image/jpeg",0.95),"JPEG",(pageW - w)/2,0,w,pageH);
    }else{
      const pagePx = canvas.width * pageH / pageW;
      let y = 0, first = true;
      while(y < canvas.height){
        const slice = document.createElement("canvas");
        slice.width = canvas.width;
        slice.height = Math.min(pagePx, canvas.height - y);
        slice.getContext("2d").drawImage(canvas,0,y,canvas.width,slice.height,0,0,canvas.width,slice.height);
        if(!first) pdf.addPage();
        pdf.addImage(slice.toDataURL("image/jpeg",0.95),"JPEG",0,0,imgW,slice.height*imgW/canvas.width);
        first = false;
        y += pagePx;
      }
    }
    const S = state[cur];
    const who = S.info.trainee || "學員";
    const d = (S.info.date||new Date().toISOString().slice(0,10)).replace(/-/g,"");
    let fnamePrefix = "Form";
    if(cur==="minicex") fnamePrefix = "miniCEX";
    else if(cur==="dops") fnamePrefix = "SplintDOPS";
    else if(cur==="evalDops") fnamePrefix = "EvalDOPS";
    
    const fname = `${fnamePrefix}_${who}_${d}.pdf`;
    if(isShare){
      const blob = pdf.output("blob");
      const file = new File([blob], fname, { type: "application/pdf" });
      if(navigator.canShare && navigator.canShare({ files: [file] })){
        try{
          await navigator.share({ files: [file], title: fname });
          msg.textContent = "已開啟分享選單。";
        }catch(e){
          // 使用者取消分享不算錯誤
          if(e.name !== "AbortError") msg.textContent = "分享未完成：" + e.message;
        }
      }else{
        // 不支援檔案分享的瀏覽器（如部分桌面瀏覽器）退回下載
        pdf.save(fname);
        msg.textContent = "此瀏覽器不支援分享，已改為下載 PDF。";
      }
    }else{
      try{
        pdf.save(fname);
        msg.textContent = "PDF 已產生，請查看下載項目。";
      }catch(e){
        const url = pdf.output("bloburl");
        window.open(url, "_blank");
        msg.textContent = "已在新分頁開啟 PDF，請用分享鈕儲存。";
      }
    }
    setTimeout(()=>{ msg.textContent=""; }, 6000);
  }catch(e){
    msg.textContent = "PDF 產生失敗：" + e.message;
  }finally{
    area.style.cssText = "";
    btn.disabled = false; btn.textContent = "匯出 PDF";
    const sb = document.getElementById("shareBtn");
    sb.disabled = false; sb.textContent = "📤 分享 / 寄送";
  }
}
